# Claude Code Hooks Configuration Example
#
# This file shows how to configure Claude Code to use the Waggle set_state.sh hook.
#
# SETUP INSTRUCTIONS:
# 1. Install the set_state.sh hook script to ~/.waggle/hooks/
#
# 2. Copy this configuration to your project's .claude/settings.local.json
#    or global ~/.claude/settings.json
#
# CUSTOMIZE STATES:
# Replace the state strings below with values that match your workflow.
# Examples: "analyzing code", "blocked", "awaiting response", "testing", etc.

hooks:
  # Called when session starts - initializes agent state
  # Customize: Use any descriptive string for session initialization
  SessionStart: 
    - hooks:
        - type: command
          command: ~/.waggle/hooks/set_state.sh "session started"
  
  # Called when user submits a prompt - agent begins processing
  # Customize: "analyzing code", "working on task", "processing request", etc.
  UserPromptSubmit:
    - hooks:
        - type: command
          command: ~/.waggle/hooks/set_state.sh "processing data"
  
  # Called when agent needs permission from user
  # Customize: "needs approval", "blocked on permission", "awaiting decision", etc.
  PermissionRequest:
    - matcher: "*"
      hooks:
        - type: command
          command: ~/.waggle/hooks/set_state.sh "waiting for approval"
  
  # Called when Claude stops and waits for user
  # Customize: "ready for review", "waiting for input", "paused", etc.
  Stop:
    - hooks:
        - type: command
          command: ~/.waggle/hooks/set_state.sh "ready for review"
  
  # Called when agent sends a notification
  # Customize: "needs attention", "has update", "blocked", etc.
  Notification:
    - matcher: "*"
      hooks:
        - type: command
          command: ~/.waggle/hooks/set_state.sh "needs attention"

# WORKFLOW-SPECIFIC EXAMPLES:
#
# Code Review Workflow:
#   UserPromptSubmit: "analyzing changes"
#   Stop: "review complete"
#   PermissionRequest: "awaiting approval"
#
# Testing Workflow:
#   UserPromptSubmit: "running tests"
#   Stop: "tests complete"
#   Notification: "test failures detected"
#
# Build Workflow:
#   UserPromptSubmit: "building project"
#   Stop: "build ready"
#   PermissionRequest: "deploy approval needed"
